name: Release

on:
    push:
        branches:
            - main

jobs:
    conventional-commits:
        uses: apermo/reusable-workflows/.github/workflows/reusable-conventional-commits.yml@v0.4.3
    release:
        uses: apermo/reusable-workflows/.github/workflows/reusable-release.yml@v0.4.3
        permissions:
            contents: write
            pull-requests: write
